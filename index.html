<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing | Bleep Inc.</title>
    <link rel="stylesheet" href="/styling/styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto" />
  </head>
  <body>
    <header>
      <div class="container-header">
          <nav>
            <div class="nav-item">Link One</div>
            <div class="nav-item">Link Two</div>
            <div class="nav-item">Link Three</div>
          </nav>
        </div>
        <div id="container-image" class="logo"></div>
        <div id="container-name" class="name">Welcome</div>
      </div>
    </header>
    <main>
      <div class="container one">
        <p>Area 1</p>
      </div>
      <div class="container two">
        <p>Area 2</p>
      </div>
      <div class="quote-container">
        <p>Quote goes here.</p>
      </div>

      <div class="call-section">
        <div class="call-container">
            <div class="call-left">
                <strong>Call to action! It's time!</strong>
                <p class="call-message">Sign up for our product by clicking that button right over there!</p>
            </div>
            <div class="call-right">
                <button class="call-button">Sign up</button>
            </div>
        </div>
    </div>
    </main>
    <footer>
        <p>Copyright &copy; Bleep, Inc. 2026</p>
    </footer>
  </body>
</html>
